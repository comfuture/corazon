services:
  corazon:
    image: corazon:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - chroma
    ports:
      - "${CORAZON_PORT:-13000}:3000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      CORAZON_ROOT_DIR: /root/.corazon
      CODEX_HOME: /root/.corazon
      CORAZON_RUNTIME_ROOT_DIR: /root/.corazon-runtime
      CORAZON_THREADS_DIR: /root/.corazon-runtime/threads
      CORAZON_CODEX_SEED_SOURCE: /root/.codex-seed
      WORKFLOW_LOCAL_DATA_DIR: /root/.corazon-runtime/workflow-data
      CORAZON_MEMORY_CHROMA_URL: ${CORAZON_MEMORY_CHROMA_URL:-http://chroma:8000}
      CORAZON_MEMORY_CHROMA_COLLECTION: ${CORAZON_MEMORY_CHROMA_COLLECTION:-mem0}
      CORAZON_MEMORY_SYNC_ENABLED: ${CORAZON_MEMORY_SYNC_ENABLED:-true}
      MEM0_TELEMETRY: ${MEM0_TELEMETRY:-false}
      CORAZON_MEMORY_CHROMA_API_KEY: ${CORAZON_MEMORY_CHROMA_API_KEY:-}
      CORAZON_MEMORY_CHROMA_TENANT: ${CORAZON_MEMORY_CHROMA_TENANT:-}
      CORAZON_MEMORY_CHROMA_DATABASE: ${CORAZON_MEMORY_CHROMA_DATABASE:-}
    volumes:
      - type: bind
        source: ${CORAZON_HOST_STATE_DIR:-./.docker-state}/.corazon
        target: /root/.corazon
      - type: bind
        source: ${CORAZON_HOST_STATE_DIR:-./.docker-state}/.corazon-runtime
        target: /root/.corazon-runtime
      - type: bind
        source: ${CORAZON_HOST_STATE_DIR:-./.docker-state}/.ssh
        target: /root/.ssh
      - type: bind
        source: ${CORAZON_CODEX_HOST_DIR:-${HOME}/.codex}
        target: /root/.codex-seed
        read_only: true
    networks:
      - corazon-internal

  chroma:
    image: chromadb/chroma:latest
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - type: bind
        source: ${CORAZON_HOST_STATE_DIR:-./.docker-state}/chroma
        target: /chroma/chroma
    networks:
      - corazon-internal

networks:
  corazon-internal:
    name: corazon-internal
