name: ci

on: push

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Verify post-deploy recovery regression guards
        run: pnpm run recovery:verify

      - name: Verify deploy disk-pressure decision matrix
        run: pnpm run deploy:disk-pressure:verify

      - name: Verify startup alert regression guards
        run: pnpm run startup-alert:smoke

      - name: Verify audio transcription regression guards
        run: pnpm run audio-transcription:verify
