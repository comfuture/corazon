name: deploy-verification-evidence

on:
  workflow_run:
    workflows: ["deploy"]
    types: [completed]

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  record-deploy-evidence:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      TRACKING_ISSUES: "98,96"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Capture deploy run context
        id: ctx
        run: |
          set -euo pipefail
          conclusion="${{ github.event.workflow_run.conclusion }}"
          run_attempt="${{ github.event.workflow_run.run_attempt }}"
          should_post=true
          state_key="${conclusion}"

          if [[ "${conclusion}" == "failure" && "${run_attempt}" == "1" ]]; then
            should_post=false
            state_key="failure-initial"
          elif [[ "${conclusion}" == "failure" ]]; then
            state_key="failure-after-retry"
          elif [[ "${conclusion}" == "success" ]]; then
            state_key="success"
          fi

          echo "conclusion=${conclusion}" >> "$GITHUB_OUTPUT"
          echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          echo "run_number=${{ github.event.workflow_run.run_number }}" >> "$GITHUB_OUTPUT"
          echo "run_attempt=${run_attempt}" >> "$GITHUB_OUTPUT"
          echo "run_url=${{ github.event.workflow_run.html_url }}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "head_branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          echo "should_post=${should_post}" >> "$GITHUB_OUTPUT"
          echo "state_key=${state_key}" >> "$GITHUB_OUTPUT"

      - name: Retry failed deploy run once
        if: steps.ctx.outputs.conclusion == 'failure' && steps.ctx.outputs.run_attempt == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            "repos/${REPO}/actions/runs/${{ steps.ctx.outputs.run_id }}/rerun-failed-jobs"

      - name: Post evidence to tracking issues
        if: steps.ctx.outputs.should_post == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          IFS=',' read -r -a issue_numbers <<< "${TRACKING_ISSUES}"
          for issue in "${issue_numbers[@]}"; do
            trimmed="$(echo "${issue}" | xargs)"
            if [[ -z "${trimmed}" ]]; then
              continue
            fi
            previous_comment_body="$(
              gh api --paginate "repos/${REPO}/issues/${trimmed}/comments?per_page=100" \
                --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("<!-- deploy-evidence-state:")) | .body' \
                | tail -n 1
            )"
            previous_state="$(printf '%s\n' "${previous_comment_body}" | sed -n 's/.*<!-- deploy-evidence-state:\([^>]*\) -->.*/\1/p' | head -n1)"
            current_state="${{ steps.ctx.outputs.state_key }}"

            if [[ "${current_state}" == "success" && ( -z "${previous_state}" || "${previous_state}" == "success" ) ]]; then
              echo "Skipping issue #${trimmed}: no signal change for success state."
              continue
            fi

            if [[ -n "${previous_state}" && "${previous_state}" == "${current_state}" ]]; then
              echo "Skipping issue #${trimmed}: duplicate state ${current_state}."
              continue
            fi

            DEPLOY_EVIDENCE_STATE="${current_state}" \
            DEPLOY_EVIDENCE_PREVIOUS_STATE="${previous_state}" \
            DEPLOY_EVIDENCE_BRANCH="${{ steps.ctx.outputs.head_branch }}" \
            DEPLOY_EVIDENCE_HEAD_SHA="${{ steps.ctx.outputs.head_sha }}" \
            DEPLOY_EVIDENCE_RUN_NUMBER="${{ steps.ctx.outputs.run_number }}" \
            DEPLOY_EVIDENCE_RUN_ATTEMPT="${{ steps.ctx.outputs.run_attempt }}" \
            DEPLOY_EVIDENCE_RUN_URL="${{ steps.ctx.outputs.run_url }}" \
            DEPLOY_EVIDENCE_CONCLUSION="${{ steps.ctx.outputs.conclusion }}" \
              node scripts/build-deploy-evidence-comment.mjs > /tmp/deploy-evidence-comment.md

            scripts/gh-comment-safe.sh issue "${trimmed}" --repo "${REPO}" < /tmp/deploy-evidence-comment.md
          done
