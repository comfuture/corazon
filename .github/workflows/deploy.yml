name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      post_deploy_check_only:
        description: "Run only post-deploy recovery validation against current production (skip build/deploy)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && inputs.post_deploy_check_only == true && 'deploy-production-check-only' || 'deploy-production' }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CORAZON_MEMORY_CHROMA_COLLECTION: ${{ secrets.CORAZON_MEMORY_CHROMA_COLLECTION }}
      CORAZON_MEMORY_SYNC_ENABLED: ${{ secrets.CORAZON_MEMORY_SYNC_ENABLED }}
      MEM0_TELEMETRY: ${{ secrets.MEM0_TELEMETRY }}
      CORAZON_MEMORY_CHROMA_API_KEY: ${{ secrets.CORAZON_MEMORY_CHROMA_API_KEY }}
      CORAZON_MEMORY_CHROMA_TENANT: ${{ secrets.CORAZON_MEMORY_CHROMA_TENANT }}
      CORAZON_MEMORY_CHROMA_DATABASE: ${{ secrets.CORAZON_MEMORY_CHROMA_DATABASE }}
      CORAZON_PORT: ${{ secrets.CORAZON_PORT }}
      CORAZON_HOST_STATE_DIR: /home/ubuntu
      CORAZON_CODEX_HOST_DIR: /home/ubuntu/.codex
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve deploy mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.post_deploy_check_only }}" == "true" ]]; then
            echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host ${{ secrets.DEPLOY_HOST }}
            HostName ${{ secrets.DEPLOY_HOST }}
            User ubuntu
            ServerAliveInterval 15
            ServerAliveCountMax 20
            TCPKeepAlive yes
          EOF

      - name: Create remote Docker context
        run: |
          docker context rm production --force >/dev/null 2>&1 || true
          docker context create production --docker "host=${{ secrets.DEPLOY_DOCKER_HOST }}"

      - name: Verify remote Docker connectivity
        run: docker --context production info >/dev/null

      - name: Prepare remote bind mount directories
        run: |
          ssh "${{ secrets.DEPLOY_HOST }}" '
            mkdir -p /home/ubuntu/.corazon /home/ubuntu/chroma
            mkdir -p /home/ubuntu/.ssh
            chmod 700 /home/ubuntu/.ssh
          '

      - name: Print runner and remote architecture
        run: |
          uname -m
          docker --context production version --format 'client={{.Client.Arch}} server={{.Server.Arch}}'

      - name: Build application image on remote Docker host
        if: steps.mode.outputs.skip_deploy != 'true'
        run: docker --context production build --progress=plain --platform linux/arm64 -t corazon:latest .

      - name: Verify built image architecture
        if: steps.mode.outputs.skip_deploy != 'true'
        run: |
          image_platform="$(docker --context production image inspect corazon:latest --format '{{.Os}}/{{.Architecture}}')"
          echo "$image_platform"
          test "$image_platform" = "linux/arm64"

      - name: Deploy on remote Docker host
        if: steps.mode.outputs.skip_deploy != 'true'
        run: |
          docker --context production compose pull chroma
          docker --context production compose up -d --no-build --remove-orphans
          docker --context production compose ps

      - name: Load previous post-deploy recovery status
        id: previous_recovery
        run: |
          previous_status="$(ssh "${{ secrets.DEPLOY_HOST }}" 'cat /home/ubuntu/.corazon/post-deploy-recovery-last-status.txt 2>/dev/null || true')"
          previous_status="${previous_status//$'\n'/}"
          echo "status=${previous_status}" >> "$GITHUB_OUTPUT"

      - name: Run post-deploy recovery check
        run: |
          docker --context production compose exec -T corazon node scripts/post-deploy-recovery.mjs --json > post-deploy-recovery.json
          cat post-deploy-recovery.json

      - name: Evaluate post-deploy recovery gate
        id: recovery_gate
        run: |
          node scripts/evaluate-post-deploy-recovery.mjs \
            --report-file post-deploy-recovery.json \
            --previous-status "${{ steps.previous_recovery.outputs.status }}"

      - name: Persist post-deploy recovery status
        if: always() && steps.recovery_gate.outputs.status != ''
        run: |
          ssh "${{ secrets.DEPLOY_HOST }}" \
            "printf '%s\n' '${{ steps.recovery_gate.outputs.status }}' > /home/ubuntu/.corazon/post-deploy-recovery-last-status.txt"

      - name: Upload post-deploy recovery report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-recovery-${{ github.run_id }}
          path: post-deploy-recovery.json
          if-no-files-found: error

      - name: Enforce post-deploy recovery gate
        if: steps.recovery_gate.outputs.gate == 'fail'
        run: |
          echo "Recovery status is down; failing deployment gate."
          exit 1
